<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Royal Score Solo Game - Draw cards, score points, and beat your high score!">
  <meta name="author" content="EJ Edwards">
  <meta name="theme-color" content="#0a4d0a">
  <meta name="keywords" content="solo card game, single player, high score, card drawing game">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Royal Score - Solo Mode">
  <meta property="og:description" content="Draw cards, score points, and beat your high score in solo mode!">
  
  <title>Royal Score - Solo Game</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script defer src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.8/lib/p5.min.js"></script>
  <script src="js/sketch.js"></script>
  <script defer src="js/hamburger.js"></script>
  <script defer src="js/ui-enhancements.js"></script>
  <style>
    @media (max-width: 700px) {
      .desktop-only {
        display: none !important;
      }
    }

    /* Animated background gradient */
    body {
      background: linear-gradient(-45deg, #0a4d0a, #1a1a1a, #0a4d0a, #16213e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Enhanced game title */
    .game-title {
      animation: titleGlow 3s ease-in-out infinite alternate;
      position: relative;
    }

    @keyframes titleGlow {
      from {
        text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
      }
      to {
        text-shadow: 0 0 20px #FFD700, 0 0 30px #FFD700, 0 0 40px #FFD700;
      }
    }

    /* Canvas container glow */
    .canvas-section {
      position: relative;
    }

    .canvas-section::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #FFD700, transparent, #FFD700);
      border-radius: 16px;
      z-index: -1;
      animation: borderGlow 3s linear infinite;
      background-size: 200% 200%;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Info card enhancements */
    .info-card {
      position: relative;
      overflow: hidden;
    }

    .info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
      transition: left 0.5s;
    }

    .info-card:hover::before {
      left: 100%;
    }

    /* Score pulse animation */
    .info-value {
      transition: transform 0.3s ease;
    }

    .info-value.scored {
      animation: scorePulse 0.5s ease;
    }

    @keyframes scorePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); color: #4CAF50; }
      100% { transform: scale(1); }
    }

    /* Button enhancements */
    .game-btn {
      position: relative;
      overflow: hidden;
    }

    .game-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .game-btn:active::after {
      width: 300px;
      height: 300px;
    }

    /* Game over modal enhancements */
    .game-over-modal {
      animation: modalPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes modalPop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Progress bar for cards remaining */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD700, #FFA500);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="hamburger" id="hamburger-menu">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <nav class="mobile-menu" id="mobile-menu">
    <a href="index.html">🏠 Home</a>
    <a href="game.html">🎮 Solo Game</a>
    <a href="multiplayer.html">👥 Multiplayer</a>
    <button id="mobile-stats-btn">📊 Stats</button>
    <a href="documentation.html">📖 Rules</a>
  </nav>
  <header>
    <h1 class="game-title">🎴 Royal Score</h1>
  </header>
  <main>
  <nav id="controls" class="game-controls" aria-label="Game controls">
    <button id="draw-button" class="game-btn primary" aria-label="Draw 5 cards">
      <span class="btn-icon">🃏</span>
      <span class="btn-label">Draw Cards</span>
    </button>
    <button id="score-button" class="game-btn secondary" aria-label="Score your hand">
      <span class="btn-icon">🎯</span>
      <span class="btn-label">Score Hand</span>
    </button>
    <button id="stats-button" class="game-btn info" aria-label="View statistics">
      <span class="btn-icon">📊</span>
      <span class="btn-label">Stats</span>
    </button>
    <button id="reset-highscore" class="game-btn danger" aria-label="Reset high score">
      <span class="btn-icon">🔄</span>
      <span class="btn-label">Reset</span>
    </button>
    <button id="rules-button" class="doc-btn desktop-only" onclick="window.location.href='documentation.html'" aria-label="View game rules">
      <span class="btn-icon">📖</span>
      <span class="btn-label">Rules</span>
    </button>
  </nav>


  <section id="canvas-container" class="canvas-section" aria-label="Game board"></section>

  <div id="game-summary" class="game-over-modal" style="display:none;" role="dialog" aria-labelledby="game-over-title" aria-modal="true">
    <div class="game-summary-content">
      <h2 id="game-over-title">🎊 Game Over!</h2>
      <div class="final-stats">
        <p id="final-score" class="stat-line"><strong>Final Score:</strong> <span class="stat-value">0</span></p>
        <p id="final-highscore" class="stat-line"><strong>High Score:</strong> <span class="stat-value">0</span></p>
      </div>
      <button id="play-again-btn" class="play-again-button" aria-label="Play again">🎮 Play Again</button>
    </div>
  </div>

  <section class="game-info" aria-label="Game statistics">
    <div class="info-card" role="status">
      <span class="info-icon">🃏</span>
      <span class="info-label">Cards Remaining</span>
      <span id="remainingCards" class="info-value" aria-live="polite">?</span>
      <div class="progress-bar">
        <div class="progress-fill" id="cards-progress" style="width: 100%"></div>
      </div>
    </div>
    <div class="info-card" role="status">
      <span class="info-icon">🎯</span>
      <span class="info-label">Current Score</span>
      <span id="score" class="info-value" aria-live="polite">0</span>
    </div>
    <div class="info-card" role="status">
      <span class="info-icon">🏆</span>
      <span class="info-label">High Score</span>
      <span id="high-score" class="info-value" aria-live="polite">0</span>
    </div>
    <div class="info-card" role="status">
      <span class="info-icon">🎴</span>
      <span class="info-label">Last Card</span>
      <span id="last-card" class="info-value" aria-live="polite">-</span>
    </div>
  </section>
  </main>

  <!-- Mobile Controls Overlay -->
  <div class="mobile-controls">
    <button id="mobile-draw-button" class="mobile-btn primary">
      <span class="btn-icon">🃏</span>
      <span class="btn-text">Draw</span>
    </button>
    <button id="mobile-score-button" class="mobile-btn secondary">
      <span class="btn-icon">🎯</span>
      <span class="btn-text">Score</span>
    </button>
    <button id="mobile-reset-button" class="mobile-btn danger">
      <span class="btn-icon">🔄</span>
      <span class="btn-text">Reset</span>
    </button>
  </div>

  <!-- Statistics Modal -->
  <div id="stats-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📊 Game Statistics</h2>
        <span class="close-modal">&times;</span>
      </div>
      <div id="stats-content" class="stats-grid">
        <!-- Stats will be populated by JavaScript -->
      </div>
      <div class="achievements-section">
        <h3>🏆 Achievements</h3>
        <div id="achievements-grid" class="achievements-grid">
          <!-- Achievements will be populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // Update progress bar when cards remaining changes
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.target.id === 'remainingCards') {
          const remaining = parseInt(mutation.target.textContent);
          const progress = document.getElementById('cards-progress');
          if (progress && !isNaN(remaining)) {
            const percentage = (remaining / 104) * 100;
            progress.style.width = percentage + '%';
          }
        }
      });
    });

    // Start observing when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      const remainingCards = document.getElementById('remainingCards');
      if (remainingCards) {
        observer.observe(remainingCards, { childList: true });
      }
    });
  </script>
</body>

</html>
